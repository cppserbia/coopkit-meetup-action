name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1

  validate:
    name: Validate action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint action.yml structure
        # Quick sanity check on action.yml structure. The self-test job below
        # validates behavior by actually invoking the action.
        run: |
          test -f action.yml
          for key in name description runs inputs; do
            grep -qE "^${key}:" action.yml || { echo "Missing top-level: $key"; exit 1; }
          done
          grep -qE 'using:\s*composite' action.yml || { echo "Expected composite action"; exit 1; }
          echo "action.yml looks structurally OK"

  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Spell check
        run: bun run spell

  self-test:
    name: Self-test (dry-run)
    runs-on: ubuntu-latest
    # NOTE: this job depends on @coopkit/meetup being published to npm.
    # Before the first publish, it will fail at the `bunx` step with
    # "package not found". After publish, it should pass on every run.
    steps:
      - uses: actions/checkout@v4

      - name: Run action in dry-run mode against fixture config
        id: run
        uses: ./
        with:
          title: "Self-test event"
          date: "2026-12-01T18:00:00Z"
          duration: PT1H
          venue-key: online
          description: "This is a CI self-test; no API call should happen."
          dry-run: "true"
          config-path: tests/fixtures/coopkit.config.json
          # Dummy values — `dry-run: true` short-circuits before any auth.
          meetup-client-key: dummy
          meetup-member-id: dummy
          meetup-signing-key-id: dummy
          meetup-private-key: dummy

      - name: Assert outputs
        env:
          STATUS: ${{ steps.run.outputs.status }}
          EVENT_ID: ${{ steps.run.outputs.event-id }}
          EVENT_URL: ${{ steps.run.outputs.event-url }}
        shell: bash
        run: |
          set -euo pipefail
          echo "status=$STATUS event-id=$EVENT_ID event-url=$EVENT_URL"
          [ "$STATUS" = "dry-run" ] || { echo "::error::expected status=dry-run, got '$STATUS'"; exit 1; }
          [ -z "$EVENT_ID" ] || { echo "::error::expected empty event-id on dry-run, got '$EVENT_ID'"; exit 1; }
          [ -z "$EVENT_URL" ] || { echo "::error::expected empty event-url on dry-run, got '$EVENT_URL'"; exit 1; }
          echo "Outputs OK."
