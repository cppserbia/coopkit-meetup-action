name: Create Meetup Draft Event
author: coopkit
description: >-
  Create a Meetup.com Draft event from form inputs. Best used with a
  `workflow_dispatch` trigger so maintainers can create events directly from
  the Actions tab. Powered by the @coopkit/meetup npm package.

# Marketplace branding
branding:
  icon: calendar
  color: orange

inputs:
  # ── Event fields ───────────────────────────────────────────────────────────
  title:
    description: Event title.
    required: true
  date:
    description: ISO-8601 datetime in UTC (e.g. `2026-05-09T16:00:00Z`).
    required: true
  duration:
    description: ISO-8601 duration (e.g. `PT1H30M`, `PT2H`).
    required: false
    default: PT2H
  venue-key:
    description: >-
      Venue key — must exist in your `coopkit.config.json` under
      `meetup.venues`. For online-only events, configure an `online` entry
      mapped to your group's online venue ID.
    required: true
  description:
    description: Event description (Markdown allowed). Optional.
    required: false
    default: ""
  image-url:
    description: Public URL of a featured photo. Optional.
    required: false
    default: ""
  id:
    description: >-
      Stable event identifier. Auto-derived from `date` + slugified `title`
      if omitted (e.g. `2026-05-09-my-event-title`).
    required: false
    default: ""

  # ── Workflow control ───────────────────────────────────────────────────────
  dry-run:
    description: Print the GraphQL payload without calling the Meetup API.
    required: false
    default: "false"
  config-path:
    description: Path to `coopkit.config.json` in your repo.
    required: false
    default: coopkit.config.json
  package-version:
    description: >-
      `@coopkit/meetup` npm version, range, or dist-tag to invoke. Defaults to
      `0` (the latest 0.x release) so a future breaking change can't change
      this action's behavior without an explicit bump.
    required: false
    default: "0"
  bun-version:
    description: Bun version to install on the runner.
    required: false
    default: "1.3.13"

  # ── Meetup OAuth secrets ───────────────────────────────────────────────────
  # Composite actions can't read the `secrets` context, so these are inputs.
  # The caller pipes repo secrets into them (see README). Note: do not write a
  # ${{ }} expression in these descriptions — GitHub evaluates it at manifest
  # load time, where `secrets` is not a valid context.
  meetup-client-key:
    description: Meetup OAuth consumer key. Pipe from the MEETUP_CLIENT_KEY secret.
    required: true
  meetup-member-id:
    description: Meetup member ID of a group organizer. Pipe from the MEETUP_MEMBER_ID secret.
    required: true
  meetup-signing-key-id:
    description: JWT signing key ID. Pipe from the MEETUP_SIGNING_KEY_ID secret.
    required: true
  meetup-private-key:
    description: JWT signing private-key PEM contents. Pipe from the MEETUP_PRIVATE_KEY secret.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Write Meetup private key
      id: key
      env:
        MEETUP_PRIVATE_KEY: ${{ inputs.meetup-private-key }}
      shell: bash
      run: |
        KEY_PATH="$RUNNER_TEMP/meetup-private-key.pem"
        printf '%s' "$MEETUP_PRIVATE_KEY" > "$KEY_PATH"
        chmod 600 "$KEY_PATH"
        echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"

    - name: Build NormalizedEvent JSON
      id: build
      env:
        TITLE: ${{ inputs.title }}
        DATE: ${{ inputs.date }}
        DURATION: ${{ inputs.duration }}
        VENUE_KEY: ${{ inputs.venue-key }}
        DESCRIPTION: ${{ inputs.description }}
        IMAGE_URL: ${{ inputs.image-url }}
        USER_ID: ${{ inputs.id }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "$USER_ID" ]; then
          DATE_PART=$(printf '%s' "$DATE" | cut -c1-10)
          SLUG=$(printf '%s' "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-50)
          USER_ID="${DATE_PART}-${SLUG}"
        fi
        EVENT_JSON_PATH="$RUNNER_TEMP/event.json"

        jq -n \
          --arg id "$USER_ID" \
          --arg title "$TITLE" \
          --arg date "$DATE" \
          --arg duration "$DURATION" \
          --arg venueKey "$VENUE_KEY" \
          --arg description "$DESCRIPTION" \
          --arg imageUrl "$IMAGE_URL" \
          '{
            id: $id,
            title: $title,
            date: $date,
            duration: $duration,
            venueKey: $venueKey
          }
          + (if $description == "" then {} else {description: $description} end)
          + (if $imageUrl == "" then {} else {imageUrl: $imageUrl} end)' \
          > "$EVENT_JSON_PATH"

        echo "event-json=$EVENT_JSON_PATH" >> "$GITHUB_OUTPUT"
        echo "--- NormalizedEvent ---"
        cat "$EVENT_JSON_PATH"

    - name: Create Meetup draft event
      env:
        MEETUP_CLIENT_KEY: ${{ inputs.meetup-client-key }}
        MEETUP_MEMBER_ID: ${{ inputs.meetup-member-id }}
        MEETUP_SIGNING_KEY_ID: ${{ inputs.meetup-signing-key-id }}
        MEETUP_PRIVATE_KEY_PATH: ${{ steps.key.outputs.path }}
      shell: bash
      run: |
        set -euo pipefail
        DRY_RUN_FLAG=""
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          DRY_RUN_FLAG="--dry-run"
        fi
        bunx --bun "@coopkit/meetup@${{ inputs.package-version }}" create-from-json \
          --config "${{ inputs.config-path }}" \
          $DRY_RUN_FLAG \
          "${{ steps.build.outputs.event-json }}"

    - name: Clean up private key
      if: always() && steps.key.outputs.path != ''
      shell: bash
      run: rm -f "${{ steps.key.outputs.path }}"
